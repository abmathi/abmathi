title: "Austin’s Angle"
description: "Street and outdoor photography by Austin"
url: "https://abmathi.github.io"
baseurl: "/abmathi"
author:
  name: "Austin Mathis"
  avatar: "/assets/images/profile.jpg"
  bio: "Go-with-the-flow street and trail photographer dreaming of Nat Geo."
  links:
    - label: "Instagram"
      icon: "fab fa-instagram"
      url: "https://instagram.com/austinsangle"
    - label: "YouTube"
      icon: "fab fa-youtube"
      url: "https://youtube.com/@austinsangle"

remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-include-cache
  - jekyll-seo-tag

collections:
  portfolio:
    output: true
    permalink: /:collection/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: "portfolio"
    values:
      layout: single
      author_profile: true
